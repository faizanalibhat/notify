name: Trivy Scan

on:
  workflow_run:
    workflows: ["Deploy Notify Service"]
    branches: [ master ]
    types:
      - completed

env:
  SERVICE_NAME: notify
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. SAST Scan (Misconfigurations)
      - name: Run Trivy SAST scanner
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: 'fs'
          scanners: 'config'
          format: 'json'
          output: 'trivy-sast-results.json'

      - name: Push SAST results to Snapsec
        env:
          SNAPSEC_TRIVY_CONFIGURATION_SCANNING_WEBHOOK: ${{ secrets.SNAPSEC_TRIVY_CONFIGURATION_SCANNING_WEBHOOK }}
          SNAPSEC_API_KEY: ${{ secrets.SNAPSEC_API_KEY }}
        run: |
          if [ -f trivy-sast-results.json ]; then
            echo "Pushing Trivy SAST results to Snapsec..."
            curl -X POST "${SNAPSEC_TRIVY_CONFIGURATION_SCANNING_WEBHOOK}" \
                 -H "x-api-key: ${SNAPSEC_API_KEY}" \
                 -H "Content-Type: application/json" \
                 -H "x-affected-asset: ${{ env.SERVICE_NAME }}" \
                 -d @trivy-sast-results.json \
                 -k
          fi

      # 2. Secret Scan
      - name: Run Trivy Secret scanner
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: 'fs'
          scanners: 'secret'
          format: 'json'
          output: 'trivy-secret-results.json'

      - name: Push Secret results to Snapsec
        env:
          SNAPSEC_TRIVY_SECRET_SCANNING_WEBHOOK: ${{ secrets.SNAPSEC_TRIVY_SECRET_SCANNING_WEBHOOK }}
          SNAPSEC_API_KEY: ${{ secrets.SNAPSEC_API_KEY }}
        run: |
          if [ -f trivy-secret-results.json ]; then
            echo "Pushing Trivy Secret results to Snapsec..."
            curl -X POST "${SNAPSEC_TRIVY_SECRET_SCANNING_WEBHOOK}" \
                 -H "x-api-key: ${SNAPSEC_API_KEY}" \
                 -H "Content-Type: application/json" \
                 -H "x-affected-asset: ${{ env.SERVICE_NAME }}" \
                 -d @trivy-secret-results.json \
                 -k
          fi

      # 3. Image Scan (Vulnerabilities)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy Image scanner
        uses: aquasecurity/trivy-action@v0.24.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/${{ env.SERVICE_NAME }}:master'
          scan-type: 'image'
          scanners: 'vuln'
          format: 'json'
          output: 'trivy-image-results.json'

      - name: Push Image results to Snapsec
        env:
          SNAPSEC_TRIVY_IMAGE_SCANNING_WEBHOOK: ${{ secrets.SNAPSEC_TRIVY_IMAGE_SCANNING_WEBHOOK }}
          SNAPSEC_API_KEY: ${{ secrets.SNAPSEC_API_KEY }}
        run: |
          if [ -f trivy-image-results.json ]; then
            echo "Pushing Trivy Image results to Snapsec..."
            curl -X POST "${SNAPSEC_TRIVY_IMAGE_SCANNING_WEBHOOK}" \
                 -H "x-api-key: ${SNAPSEC_API_KEY}" \
                 -H "Content-Type: application/json" \
                 -H "x-affected-asset: ${{ env.SERVICE_NAME }}" \
                 -d @trivy-image-results.json \
                 -k
          fi

      # 4. TruffleHog Scan
      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b .

      - name: Run TruffleHog Secret Scanner
        run: |
          ./trufflehog git file://. --only-verified --json > trufflehog-results.json || true

      - name: Push TruffleHog results to Snapsec
        env:
          SNAPSEC_TRUFFLEHOG_WEBHOOK: ${{ secrets.SNAPSEC_TRUFFLEHOG_WEBHOOK }}
          SNAPSEC_API_KEY: ${{ secrets.SNAPSEC_API_KEY }}
        run: |
          if [ -f trufflehog-results.json ]; then
            echo "Pushing TruffleHog results to Snapsec..."
            curl -X POST "${SNAPSEC_TRUFFLEHOG_WEBHOOK}" \
                 -H "x-api-key: ${SNAPSEC_API_KEY}" \
                 -H "Content-Type: application/json" \
                 -H "x-affected-asset: ${{ env.SERVICE_NAME }}" \
                 -d @trufflehog-results.json \
                 -k
          fi

      # 5. Dependency-Check Scan
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ env.SERVICE_NAME }}
          path: '.'
          format: 'JSON'
          out: 'dependency-check-report.json'

      - name: Push Dependency-Check results to Snapsec
        env:
          SNAPSEC_DEPCHECK_WEBHOOK: ${{ secrets.SNAPSEC_DEPCHECK_WEBHOOK }}
          SNAPSEC_API_KEY: ${{ secrets.SNAPSEC_API_KEY }}
        run: |
          if [ -f dependency-check-report.json ]; then
            echo "Pushing Dependency-Check results to Snapsec..."
            curl -X POST "${SNAPSEC_DEPCHECK_WEBHOOK}" \
                 -H "x-api-key: ${SNAPSEC_API_KEY}" \
                 -H "Content-Type: application/json" \
                 -H "x-affected-asset: ${{ env.SERVICE_NAME }}" \
                 -d @dependency-check-report.json \
                 -k
          fi

      # 6. npm audit Scan
      - name: Run npm audit
        run: npm audit --json > npm-audit-report.json || true

      - name: Push npm audit results to Snapsec
        env:
          SNAPSEC_NPMAUDIT_WEBHOOK: ${{ secrets.SNAPSEC_NPMAUDIT_WEBHOOK }}
          SNAPSEC_API_KEY: ${{ secrets.SNAPSEC_API_KEY }}
        run: |
          if [ -f npm-audit-report.json ]; then
            echo "Pushing npm audit results to Snapsec..."
            curl -X POST "${SNAPSEC_NPMAUDIT_WEBHOOK}" \
                 -H "x-api-key: ${SNAPSEC_API_KEY}" \
                 -H "Content-Type: application/json" \
                 -H "x-affected-asset: ${{ env.SERVICE_NAME }}" \
                 -d @npm-audit-report.json \
                 -k
          fi

      # 7. TruffleHog Secret Scan
      - name: Run TruffleHog
        run: |
          docker run --rm -v ${{ github.workspace }}:/pwd trufflesecurity/trufflehog:latest git file:///pwd --only-verified --json > trufflehog-report.json || true
          jq -s '.' trufflehog-report.json > trufflehog-array.json

      - name: Push TruffleHog results to Snapsec
        env:
          SNAPSEC_TRUFFLEHOG_WEBHOOK: ${{ secrets.SNAPSEC_TRUFFLEHOG_WEBHOOK }}
          SNAPSEC_API_KEY: ${{ secrets.SNAPSEC_API_KEY }}
        run: |
          if [ -f trufflehog-array.json ]; then
            echo "Pushing TruffleHog results to Snapsec..."
            curl -X POST "${SNAPSEC_TRUFFLEHOG_WEBHOOK}" \
                 -H "x-api-key: ${SNAPSEC_API_KEY}" \
                 -H "Content-Type: application/json" \
                 -H "x-affected-asset: ${{ env.SERVICE_NAME }}" \
                 -d @trufflehog-array.json \
                 -k
          fi
